<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir Sign In / Sign Out</title>
<link rel="icon" href="StPeterFavicon.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #8b1a1a;
    --red-light: #f7eeee;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --muted: #757575;
    --green: #2e7d32;
    --green-light: #f1f8f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: #f5f5f5; color: var(--text); min-height: 100vh; }

  header {
    background: #fff;
    border-bottom: 2px solid var(--red);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header img { width: 52px; height: 52px; object-fit: contain; }
  .header-text h1 { font-size: 1.2rem; font-weight: 700; color: var(--red); }
  .header-text .subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 1px; }

  main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  #screen-home.active { display: flex; flex-direction: column; gap: 1rem; }
  .mode-btn {
    width: 100%; padding: 1.25rem; border: none; border-radius: 8px;
    font-family: 'Roboto', sans-serif; font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .mode-btn:hover { opacity: 0.88; }
  .mode-btn.signin  { background: var(--green); color: #fff; }
  .mode-btn.signout { background: var(--red);   color: #fff; }

  /* LIST */
  .back-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'Roboto', sans-serif; font-size: 0.88rem;
    cursor: pointer; padding: 0 0 1rem;
    display: flex; align-items: center; gap: 0.3rem;
  }
  .back-btn:hover { color: var(--text); }
  .list-heading {
    font-size: 0.78rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;
  }
  .names-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .name-btn {
    display: block; width: 100%; background: none;
    border: none; border-bottom: 1px solid var(--border);
    text-align: left; padding: 0.85rem 1.25rem;
    font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: 400;
    color: var(--text); cursor: pointer; border-left: 4px solid transparent;
    transition: background 0.1s;
  }
  .name-btn:last-child { border-bottom: none; }
  .name-btn.signin-mode:hover  { background: var(--green-light); border-left-color: var(--green); color: var(--green); font-weight: 500; }
  .name-btn.signout-mode:hover { background: var(--red-light);   border-left-color: var(--red);   color: var(--red);   font-weight: 500; }
  .empty-msg { padding: 1.25rem; font-size: 0.9rem; color: var(--muted); font-style: italic; }

  /* CONFIRM - full screen takeover */
  #screen-confirm {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: #fff;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  #screen-confirm.active { display: flex; }

  .confirm-action {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .confirm-name {
    font-size: 3rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 3rem;
  }
  .confirm-btns {
    display: flex;
    gap: 1.25rem;
    width: 100%;
    max-width: 400px;
  }
  .confirm-btn {
    flex: 1;
    padding: 1.25rem;
    border: none;
    border-radius: 12px;
    font-family: 'Roboto', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .confirm-btn:hover  { opacity: 0.9; }
  .confirm-btn:active { transform: scale(0.97); }
  .confirm-btn:disabled { opacity: 0.35; pointer-events: none; }
  .confirm-btn .btn-icon {
    font-size: 2.2rem;
    line-height: 1;
  }
  .confirm-btn.tick  { background: var(--green); color: #fff; }
  .confirm-btn.cross { background: #eeeeee; color: #555; }

  .loading-msg { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 0.9rem; }

  .error-box {
    background: #fff3f3; border: 1px solid #f5c6c6;
    color: var(--red); padding: 0.9rem 1.25rem;
    border-radius: 6px; font-size: 0.88rem; margin-bottom: 1rem;
  }

  .admin-link {
    position: fixed; bottom: 1.25rem; right: 1.25rem;
    font-size: 0.72rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .admin-link:hover { color: var(--red); }
</style>
</head>
<body>

<header>
  <img src="GraphicMaster.png" alt="Choir crest">
  <div class="header-text">
    <h1>Choir Sign In / Sign Out</h1>
    <div class="subtitle" id="hdr-date"></div>
  </div>
</header>

<main>
  <div id="error-area"></div>
  <div class="loading-msg" id="loading">Loading...</div>

  <!-- HOME -->
  <div id="screen-home" class="screen">
    <button class="mode-btn signin"  onclick="showList('in')">Sign In</button>
    <button class="mode-btn signout" onclick="showList('out')">Sign Out</button>
  </div>

  <!-- LIST -->
  <div id="screen-list" class="screen">
    <button class="back-btn" onclick="showHome()">&#8592; Back</button>
    <div class="list-heading" id="list-heading"></div>
    <div class="names-card" id="names-card"></div>
  </div>
</main>
<!-- DONE -->
<div id="screen-done" class="screen" style="position:fixed;inset:0;z-index:50;background:#fff;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div style="font-size:5rem;color:#2e7d32;line-height:1;margin-bottom:1rem;">&#10003;</div>
  <div style="font-size:0.85rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#757575;margin-bottom:0.5rem;">Done</div>
  <div style="font-size:3rem;font-weight:900;color:#1a1a1a;line-height:1.1;" id="done-name"></div>
</div>
<!-- CONFIRM - outside main, full screen -->
<div id="screen-confirm" class="screen">
  <div class="confirm-action" id="confirm-label"></div>
  <div class="confirm-name"   id="confirm-name"></div>
  <div class="confirm-btns">
    <button class="confirm-btn tick"  id="btn-tick"  onclick="doConfirm(true)">
      <span class="btn-icon">&#10003;</span>
      Confirm
    </button>
    <button class="confirm-btn cross" id="btn-cross" onclick="doConfirm(false)">
      <span class="btn-icon">&#10005;</span>
      Cancel
    </button>
  </div>
</div>

<a href="admin.html" class="admin-link">Admin</a>

<script src="config.js"></script>
<script>
let choristers = [];
let statusMap = {};
let currentMode = null;
let pendingChorister = null;

document.getElementById("hdr-date").textContent =
  new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showHome() {
  currentMode = null;
  pendingChorister = null;
  showScreen("screen-home");
}

function showList(mode) {
  currentMode = mode;
  renderList();
  showScreen("screen-list");
}

function showConfirm(chorister) {
  pendingChorister = chorister;
  document.getElementById("confirm-label").textContent =
    currentMode === "in" ? "Signing in as" : "Signing out as";
  document.getElementById("confirm-name").textContent = chorister.name;
  document.getElementById("btn-tick").disabled = false;
  document.getElementById("btn-cross").disabled = false;
  showScreen("screen-confirm");
}

function renderList() {
  const card = document.getElementById("names-card");
  const heading = document.getElementById("list-heading");
  card.innerHTML = "";

  const modeClass = currentMode === "in" ? "signin-mode" : "signout-mode";
  const people = choristers
    .filter(c => currentMode === "in"
      ? (statusMap[c.name] || "out") === "out"
      : statusMap[c.name] === "in")
    .sort((a,b) => a.name.localeCompare(b.name));

  heading.textContent = currentMode === "in" ? "Who's signing in?" : "Who's signing out?";

  if (!people.length) {
    card.innerHTML = '<div class="empty-msg">' +
      (currentMode === "in" ? "Everyone is already signed in." : "Nobody is currently signed in.") +
      '</div>';
    return;
  }

  people.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "name-btn " + modeClass;
    btn.textContent = c.name;
    btn.addEventListener("click", () => showConfirm(c));
    card.appendChild(btn);
  });
}

async function doConfirm(confirmed) {
  if (!confirmed) {
    showList(currentMode);
    return;
  }

  document.getElementById("btn-tick").disabled = true;
  document.getElementById("btn-cross").disabled = true;

  const chorister = pendingChorister;
  const newAction = currentMode === "in" ? "in" : "out";

  try {
    const params = new URLSearchParams({
      action: "checkin",
      name: chorister.name,
      voice_part: chorister.voice_part,
      checkinAction: newAction
    });
    const res = await fetch(CONFIG.API_URL + "?" + params.toString());
    const data = await res.json();
    if (data.success) {
      statusMap[chorister.name] = newAction;
      showHome();
    } else {
      showError("Something went wrong. Please try again.");
      showHome();
    }
  } catch (e) {
    showError("Could not save. Check your connection.");
    showHome();
  }
}

function showError(msg) {
  const el = document.getElementById("error-area");
  el.innerHTML = '<div class="error-box">' + msg + '</div>';
  setTimeout(() => { el.innerHTML = ""; }, 4000);
}

async function init() {
  try {
    const [cRes, sRes] = await Promise.all([
      fetch(CONFIG.API_URL + "?action=choristers"),
      fetch(CONFIG.API_URL + "?action=today")
    ]);
    choristers = await cRes.json();
    const today = await sRes.json();
    today.forEach(s => { statusMap[s.name] = s.status; });
    document.getElementById("loading").style.display = "none";
    showHome();
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    showError("Could not load register. Check CONFIG.API_URL in config.js.");
  }
}

init();
</script>
</body>
</html>
