<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir Register</title>
<link rel="icon" href="StPeterFavicon.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #8b1a1a;
    --red-light: #f7eeee;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --muted: #757575;
    --green: #2e7d32;
    --green-light: #f1f8f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: #f5f5f5; color: var(--text); min-height: 100vh; }

  header {
    background: #fff;
    border-bottom: 2px solid var(--red);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header img { width: 52px; height: 52px; object-fit: contain; }
  .header-text h1 { font-size: 1.2rem; font-weight: 700; color: var(--red); }
  .header-text .subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 1px; }

  main {
    max-width: 600px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  /* MODE SELECT */
  #mode-screen {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .mode-btn {
    width: 100%;
    padding: 1.25rem;
    border: none;
    border-radius: 8px;
    font-family: 'Roboto', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .mode-btn:hover { opacity: 0.9; }
  .mode-btn.signin  { background: var(--green); color: #fff; }
  .mode-btn.signout { background: var(--red);   color: #fff; }

  /* NAME LIST */
  #list-screen { display: none; }
  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Roboto', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    padding: 0 0 1rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .back-btn:hover { color: var(--text); }
  .list-heading {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.78rem;
  }
  .names-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .name-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    text-align: left;
    padding: 0.85rem 1.25rem;
    font-family: 'Roboto', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: background 0.1s;
  }
  .name-btn:last-child { border-bottom: none; }
  .name-btn.signin-mode:hover  { background: var(--green-light); border-left-color: var(--green); color: var(--green); font-weight: 500; }
  .name-btn.signout-mode:hover { background: var(--red-light);   border-left-color: var(--red);   color: var(--red);   font-weight: 500; }
  .name-btn.busy { opacity: 0.4; pointer-events: none; }
  .empty-msg { padding: 1.25rem; font-size: 0.9rem; color: var(--muted); font-style: italic; }

  .loading-msg { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 0.9rem; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 0.55rem 1.2rem;
    border-radius: 4px;
    font-size: 0.88rem;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.late { background: #b94a00; }
  .toast.show { opacity: 1; }

  .admin-link {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    font-size: 0.72rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .admin-link:hover { color: var(--red); }

  .error-box {
    background: #fff3f3;
    border: 1px solid #f5c6c6;
    color: var(--red);
    padding: 0.9rem 1.25rem;
    border-radius: 6px;
    font-size: 0.88rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>

<header>
  <img src="GraphicMaster.png" alt="Choir crest">
  <div class="header-text">
    <h1>Choir Register</h1>
    <div class="subtitle" id="hdr-date"></div>
  </div>
</header>

<main>
  <div id="error-area"></div>
  <div class="loading-msg" id="loading">Loading...</div>

  <div id="mode-screen">
    <button class="mode-btn signin"  onclick="showList('in')">Sign In</button>
    <button class="mode-btn signout" onclick="showList('out')">Sign Out</button>
  </div>

  <div id="list-screen">
    <button class="back-btn" onclick="showMode()">&#8592; Back</button>
    <div class="list-heading" id="list-heading"></div>
    <div class="names-card" id="names-card"></div>
  </div>
</main>

<div class="toast" id="toast"></div>
<a href="admin.html" class="admin-link">Admin</a>

<script src="config.js"></script>
<script>
let choristers = [];
let statusMap = {};
let currentMode = null;

document.getElementById("hdr-date").textContent =
  new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

function showError(msg) {
  document.getElementById("error-area").innerHTML = '<div class="error-box">' + msg + '</div>';
}

function showToast(msg, late) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (late ? " late" : "") + " show";
  setTimeout(() => { el.className = "toast" + (late ? " late" : ""); }, 2500);
}

function showMode() {
  document.getElementById("list-screen").style.display = "none";
  document.getElementById("mode-screen").style.display = "flex";
  currentMode = null;
}

function showList(mode) {
  currentMode = mode;
  document.getElementById("mode-screen").style.display = "none";
  document.getElementById("list-screen").style.display = "block";
  renderList();
}

function renderList() {
  const card = document.getElementById("names-card");
  const heading = document.getElementById("list-heading");
  card.innerHTML = "";

  if (currentMode === "in") {
    heading.textContent = "Who's signing in?";
    const people = choristers
      .filter(c => (statusMap[c.name] || "out") === "out")
      .sort((a,b) => a.name.localeCompare(b.name));
    if (!people.length) {
      card.innerHTML = '<div class="empty-msg">Everyone is already signed in.</div>';
    } else {
      people.forEach(c => card.appendChild(makeBtn(c, "signin-mode")));
    }
  } else {
    heading.textContent = "Who's signing out?";
    const people = choristers
      .filter(c => statusMap[c.name] === "in")
      .sort((a,b) => a.name.localeCompare(b.name));
    if (!people.length) {
      card.innerHTML = '<div class="empty-msg">Nobody is currently signed in.</div>';
    } else {
      people.forEach(c => card.appendChild(makeBtn(c, "signout-mode")));
    }
  }
}

function makeBtn(c, modeClass) {
  const btn = document.createElement("button");
  btn.className = "name-btn " + modeClass;
  btn.textContent = c.name;
  btn.addEventListener("click", () => toggle(c, btn));
  return btn;
}

async function toggle(chorister, btn) {
  btn.classList.add("busy");
  const newAction = currentMode === "in" ? "in" : "out";
  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "checkin",
        name: chorister.name,
        voice_part: chorister.voice_part,
        checkinAction: newAction
      })
    });
    const data = await res.json();
    if (data.success) {
      statusMap[chorister.name] = newAction;
      const first = chorister.name.split(" ")[0];
      if (newAction === "in") {
        showToast(first + (data.late ? " signed in (late)" : " signed in"), data.late);
      } else {
        showToast(first + " signed out", false);
      }
      renderList();
    } else {
      showError("Something went wrong. Please try again.");
      btn.classList.remove("busy");
    }
  } catch (e) {
    showError("Could not save. Check your connection.");
    btn.classList.remove("busy");
  }
}

async function init() {
  try {
    const [cRes, sRes] = await Promise.all([
      fetch(CONFIG.API_URL + "?action=choristers"),
      fetch(CONFIG.API_URL + "?action=today")
    ]);
    choristers = await cRes.json();
    const today = await sRes.json();
    today.forEach(s => { statusMap[s.name] = s.status; });
    document.getElementById("loading").style.display = "none";
    document.getElementById("mode-screen").style.display = "flex";
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    showError("Could not load register. Check CONFIG.API_URL in config.js.");
  }
}

// hide both screens until loaded
document.getElementById("mode-screen").style.display = "none";
document.getElementById("list-screen").style.display = "none";

init();
</script>
</body>
</html>
